<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GCP Storage 瀏覽器 - 我是功能一</title>
    <!-- Import Google Fonts (Outfit & Noto Sans TC) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&family=Outfit:wght@300;400;500;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #0b0f19;
            --card-bg: rgba(22, 28, 45, 0.4);
            --card-border: rgba(255, 255, 255, 0.08);
            --text-primary: #f3f4f6;
            --text-secondary: #9ca3af;
            --accent-primary: #3b82f6; /* Blue for GCP themed UI */
            --accent-secondary: #10b981;
            --accent-hover: #60a5fa;
            --success: #10b981;
            --danger: #ef4444;
            --font-main: 'Outfit', 'Noto Sans TC', sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-color);
            background-image: 
                radial-gradient(at 0% 0%, rgba(59, 130, 246, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(16, 185, 129, 0.15) 0px, transparent 50%);
            background-attachment: fixed;
            color: var(--text-primary);
            font-family: var(--font-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 2rem 1rem;
            overflow-x: hidden;
        }

        .container {
            width: 100%;
            max-width: 900px;
            display: flex;
            flex-direction: column;
            gap: 2rem;
            z-index: 10;
        }

        /* Hero Header */
        header {
            text-align: center;
            margin-top: 1rem;
            position: relative;
        }

        .nav-back {
            position: absolute;
            left: 0;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-secondary);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-weight: 500;
            font-size: 0.95rem;
            transition: color 0.3s ease;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--card-border);
            padding: 0.5rem 1rem;
            border-radius: 12px;
        }

        .nav-back:hover {
            color: #ffffff;
            border-color: var(--accent-primary);
            background: rgba(59, 130, 246, 0.1);
        }

        .badge {
            background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
            padding: 0.4rem 1rem;
            border-radius: 50px;
            font-size: 0.85rem;
            font-weight: 500;
            letter-spacing: 1px;
            display: inline-block;
            margin-bottom: 1rem;
            box-shadow: 0 4px 15px rgba(59, 130, 246, 0.3);
            text-transform: uppercase;
        }

        h1 {
            font-size: 3.5rem;
            font-weight: 700;
            background: linear-gradient(to right, #ffffff, #93c5fd, #34d399);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.5rem;
            letter-spacing: -1px;
            filter: drop-shadow(0 2px 8px rgba(59, 130, 246, 0.2));
        }

        header p {
            color: var(--text-secondary);
            font-size: 1.1rem;
            font-weight: 300;
        }

        .card {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 24px;
            padding: 2rem;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            transition: border-color 0.3s ease, box-shadow 0.3s ease;
        }

        .card-title {
            font-size: 1.4rem;
            font-weight: 600;
            margin-bottom: 1.5rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            color: #ffffff;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            padding-bottom: 0.75rem;
        }

        /* Form Styling */
        .form-row {
            display: flex;
            gap: 1rem;
            align-items: flex-end;
        }

        .form-group {
            flex: 1;
        }

        label {
            display: block;
            color: var(--text-secondary);
            font-size: 0.9rem;
            margin-bottom: 0.5rem;
            font-weight: 500;
        }

        input {
            width: 100%;
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 0.85rem 1rem;
            color: var(--text-primary);
            font-family: var(--font-main);
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        input:focus {
            outline: none;
            border-color: var(--accent-primary);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.2);
            background: rgba(15, 23, 42, 0.8);
        }

        button {
            background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
            color: #ffffff;
            border: none;
            border-radius: 12px;
            padding: 0.85rem 2rem;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 4px 15px rgba(59, 130, 246, 0.2);
            white-space: nowrap;
            height: 48px;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(59, 130, 246, 0.4);
            background: linear-gradient(135deg, var(--accent-hover), var(--accent-secondary));
        }

        button:disabled {
            background: #1e293b;
            color: var(--text-secondary);
            box-shadow: none;
            cursor: not-allowed;
            transform: none;
        }

        /* Bucket Grid */
        .bucket-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 1rem;
        }

        @media (min-width: 768px) {
            .bucket-grid {
                grid-template-columns: 1fr 1fr;
            }
        }

        .bucket-card {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 18px;
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
            transition: all 0.3s ease;
            animation: fadeIn 0.4s ease forwards;
        }

        .bucket-card:hover {
            background: rgba(255, 255, 255, 0.05);
            transform: translateY(-4px);
            border-color: rgba(59, 130, 246, 0.3);
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }

        .bucket-header {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            padding-bottom: 0.75rem;
        }

        .bucket-icon {
            width: 36px;
            height: 36px;
            border-radius: 8px;
            background: rgba(59, 130, 246, 0.1);
            border: 1px solid rgba(59, 130, 246, 0.2);
            color: var(--accent-primary);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .bucket-name {
            font-size: 1.1rem;
            font-weight: 600;
            color: #ffffff;
            word-break: break-all;
        }

        .meta-list {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            font-size: 0.85rem;
        }

        .meta-item {
            display: flex;
            justify-content: space-between;
            color: var(--text-secondary);
        }

        .meta-value {
            font-weight: 500;
            color: var(--text-primary);
        }

        /* Loading / Empty States */
        .loading-spinner {
            display: none;
            justify-content: center;
            align-items: center;
            padding: 3rem 0;
        }

        .spinner {
            border: 3px solid rgba(255, 255, 255, 0.1);
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border-left-color: var(--accent-primary);
            animation: spin 1s linear infinite;
        }

        .empty-state {
            text-align: center;
            color: var(--text-secondary);
            padding: 3rem 0;
            font-style: italic;
        }

        /* Toast Alert */
        .toast {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            padding: 1rem 1.5rem;
            border-radius: 12px;
            background: #1e293b;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            display: flex;
            align-items: center;
            gap: 0.75rem;
            z-index: 100;
            transform: translateY(150%);
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border-left: 4px solid var(--danger);
        }

        .toast.show {
            transform: translateY(0);
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Hero Header -->
        <header>
            <a href="/user" class="nav-back">
                <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"/>
                </svg>
                用戶管理
            </a>
            <span class="badge">GCP Storage</span>
            <h1>GCP 雲端存取</h1>
            <p>輸入您的 GCP Project ID 以瀏覽該專案底下的 Cloud Storage Buckets</p>
        </header>

        <!-- Search Card -->
        <div class="card">
            <div class="card-title">
                <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
                </svg>
                專案查詢
            </div>
            <form id="searchForm">
                <div class="form-row">
                    <div class="form-group">
                        <label for="projectId">GCP Project ID</label>
                        <input type="text" id="projectId" placeholder="例如: my-gcp-project-123" required autocomplete="off">
                    </div>
                    <button type="submit" id="searchBtn">查詢 Buckets</button>
                </div>
            </form>
        </div>

        <!-- Result Card -->
        <div class="card">
            <div class="card-title">
                <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"/>
                </svg>
                Bucket 列表
            </div>
            
            <div class="loading-spinner" id="loading">
                <div class="spinner"></div>
            </div>

            <div class="bucket-grid" id="bucketList">
                <div class="empty-state" style="grid-column: 1 / -1;">請先在上方輸入 GCP Project ID 並點擊查詢</div>
            </div>
        </div>
    </div>

    <!-- Notification Toast -->
    <div id="toast" class="toast">
        <span id="toast-message"></span>
    </div>

    <script>
        const searchForm = document.getElementById('searchForm');
        const searchBtn = document.getElementById('searchBtn');
        const projectIdInput = document.getElementById('projectId');
        const bucketList = document.getElementById('bucketList');
        const loading = document.getElementById('loading');
        const toast = document.getElementById('toast');
        const toastMessage = document.getElementById('toast-message');

        function showError(message) {
            toastMessage.textContent = message;
            toast.classList.add('show');
            setTimeout(() => {
                toast.classList.remove('show');
            }, 5000);
        }

        searchForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const projectId = projectIdInput.value.trim();
            if (!projectId) return;

            // UI Reset
            bucketList.style.display = 'none';
            loading.style.display = 'flex';
            searchBtn.disabled = true;

            try {
                const response = await fetch(`/api/gcp/buckets?project_id=${encodeURIComponent(projectId)}`);
                const result = await response.json();

                if (!response.ok) {
                    throw new Error(result.error || '查詢失敗，請檢查專案名稱或憑證權限');
                }

                renderBuckets(result);
            } catch (error) {
                console.error(error);
                showError(error.message);
                bucketList.innerHTML = `<div class="empty-state" style="grid-column: 1 / -1; color: var(--danger); font-weight: 500;">錯誤: ${error.message}</div>`;
            } finally {
                loading.style.display = 'none';
                bucketList.style.display = 'grid';
                searchBtn.disabled = false;
            }
        });

        function renderBuckets(buckets) {
            bucketList.innerHTML = '';

            if (buckets.length === 0) {
                bucketList.innerHTML = '<div class="empty-state" style="grid-column: 1 / -1;">該專案中沒有任何 Cloud Storage Bucket</div>';
                return;
            }

            buckets.forEach(bucket => {
                const card = document.createElement('div');
                card.className = 'bucket-card';
                card.innerHTML = `
                    <div class="bucket-header">
                        <div class="bucket-icon">
                            <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"/>
                            </svg>
                        </div>
                        <div class="bucket-name" title="${bucket.name}">${bucket.name}</div>
                    </div>
                    <div class="meta-list">
                        <div class="meta-item">
                            <span>區域位置</span>
                            <span class="meta-value">${bucket.location || 'N/A'}</span>
                        </div>
                        <div class="meta-item">
                            <span>儲存類別</span>
                            <span class="meta-value">${bucket.storage_class || 'N/A'}</span>
                        </div>
                        <div class="meta-item">
                            <span>建立時間</span>
                            <span class="meta-value">${formatDate(bucket.time_created)}</span>
                        </div>
                    </div>
                `;
                bucketList.appendChild(card);
            });
        }

        function formatDate(dateStr) {
            if (!dateStr) return 'N/A';
            try {
                const d = new Date(dateStr);
                return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')} ${String(d.getHours()).padStart(2, '0')}:${String(d.getMinutes()).padStart(2, '0')}`;
            } catch (e) {
                return dateStr;
            }
        }
    </script>
</body>
</html>
